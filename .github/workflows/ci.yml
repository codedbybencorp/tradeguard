name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "."

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Check CLI works
        run: |
          tradeguard --help

  docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t tradeguard:test .

      - name: Test Docker image
        run: |
          docker run -d --name tg-test -p 8000:8000 tradeguard:test
          sleep 5
          curl -f http://localhost:8000/health || exit 1
          docker stop tg-test && docker rm tg-test

      - name: Test CLI in container
        run: |
          docker run --rm tradeguard:test tradeguard --help
